name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: haru
  SCHEME: ccmaxok
  PROJECT: ccmaxok/ccmaxok.xcodeproj
  TEAM_ID: DUV8UP2WXU

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    outputs:
      sha256: ${{ steps.package.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Inject version into Xcode project
        run: |
          cd ccmaxok
          agvtool new-marketing-version "${{ steps.version.outputs.version }}"
          agvtool new-version -all "${{ github.run_number }}"

      - name: Import certificates
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm "$RUNNER_TEMP/cert.p12"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath build/$APP_NAME.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            -quiet

      - name: Export
        run: |
          xcodebuild -exportArchive \
            -archivePath build/$APP_NAME.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist scripts/export-options.plist \
            -quiet

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          # Create initial zip for notarization
          ditto -c -k --keepParent "build/export/$APP_NAME.app" "build/$APP_NAME.zip"

          # Submit for notarization
          xcrun notarytool submit "build/$APP_NAME.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARY_PASSWORD" \
            --wait

          # Staple the notarization ticket
          xcrun stapler staple "build/export/$APP_NAME.app"

          # Re-create zip with stapled app
          rm "build/$APP_NAME.zip"
          ditto -c -k --keepParent "build/export/$APP_NAME.app" "build/$APP_NAME.zip"

      - name: Compute SHA256
        id: package
        run: |
          SHA256=$(shasum -a 256 "build/$APP_NAME.zip" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/${{ env.APP_NAME }}.zip
          generate_release_notes: true

      - name: Upload build artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/**/*.log
            ~/Library/Logs/DiagnosticReports/*

  update-cask:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Cask formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          SHA256="${{ needs.build-and-release.outputs.sha256 }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/JuyeonYu/homebrew-haru.git" tap
          cd tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Update version and sha256 in cask formula
          sed -i "s/version \".*\"/version \"$VERSION\"/" Casks/haru.rb
          sed -i "s/sha256 \".*\"/sha256 \"$SHA256\"/" Casks/haru.rb

          git add Casks/haru.rb
          git commit -m "Update haru to v$VERSION"
          git push
